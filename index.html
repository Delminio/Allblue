<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nosso Álbum</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="hearts" id="hearts"></div>

  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-badge"></div>
        <div>
          <h1>Nosso Álbum</h1>
        </div>
      </div>
      <div class="top-actions">
        <span class="pill" id="pageCounter">página 1 de 8</span>
      </div>
    </header>

    <section class="story-card">
      <div class="section-kicker" id="pageKicker">página 1</div>
      <h2 class="hero-title" id="pageTitle"></h2>

      <div class="images-grid">
        <div class="image-frame"><img id="imgLeft" alt="Foto principal"></div>
        <div class="image-frame"><img id="imgRight" alt="Imagem secundária"></div>
      </div>

      <article class="text-card">
        <div id="pageText"></div>
      </article>

      <section class="spotify-card">
        <div class="spotify-head">
          <span>trilha da página • Spotify</span>
          <a id="spotifyOpen" target="_blank" rel="noopener">abrir no Spotify</a>
        </div>
        <iframe id="spotifyFrame" style="border-radius:12px" src="" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
      </section>

      <div class="nav-row">
        <button class="nav-btn secondary" id="prevBtn">Voltar</button>
        <button class="nav-btn" id="nextBtn">Próximo</button>
      </div>
    </section>
  </main>

  <script src="js/data.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
